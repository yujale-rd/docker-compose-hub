version: '3.8'

services:
  mysql:
    image: mysql/mysql-server:8.0.32
    restart: always
    container_name: mysql-single
    hostname: mysql-single
    # 资源限制，防止 OOM
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    volumes:
      - ./data:/var/lib/mysql          # 数据持久化
      - ./config/my.cnf:/etc/my.cnf    # 配置文件挂载
      - ./init:/docker-entrypoint-initdb.d/ # 初始化脚本
      - ./logs:/var/log/mysql          # 日志挂载
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: "rootroot"
      MYSQL_ROOT_HOST: "%"             # 允许 root 远程连接
      # mysql/mysql-server 镜像使用 MYSQL_USER 和 MYSQL_PASSWORD 创建普通用户
      MYSQL_USER: "admin"
      MYSQL_PASSWORD: "adminpassword"
      # 注意：ADMIN_USER 是非标准变量，部分旧镜像支持，但标准做法是上述变量
      TZ: "Asia/Shanghai"
    # 健康检查，保证服务可用性
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootroot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # 日志轮转配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
