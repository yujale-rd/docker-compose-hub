version: '3.8'

services:
  # =================================================================================================
  # Kafka (KRaft 模式，无需 Zookeeper)
  # 资源限制：内存上限 1GB，预留 512MB (JVM Heap 512M)
  # =================================================================================================
  kafka:
    image: bitnami/kafka:3.4
    container_name: kafka-single
    hostname: kafka-single
    restart: always
    environment:
      # KRaft settings
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka-single:9094
      # Listeners
      # INTERNAL: 容器内部通信 (9092)
      # EXTERNAL: 外部/宿主机通信 (9093)
      # CONTROLLER: KRaft 控制器 (9094)
      - KAFKA_CFG_LISTENERS=INTERNAL://:9092,EXTERNAL://:9093,CONTROLLER://:9094
      # 外部访问地址必须配置为服务器 IP
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka-single:9092,EXTERNAL://192.168.19.10:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      # JVM Heap Size (非常重要，防止 OOM)
      - KAFKA_HEAP_OPTS=-Xmx1g -Xms1g
      # Other
      - ALLOW_PLAINTEXT_LISTENER=yes
      - TZ=Asia/Shanghai
    ports:
      - "9093:9093"
    volumes:
      - ./data:/bitnami/kafka
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
        reservations:
          cpus: '0.2'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka-single:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # =================================================================================================
  # Kafka UI
  # Web 界面管理工具
  # =================================================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    hostname: kafka-ui
    restart: always
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-single:9092
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      - kafka
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
