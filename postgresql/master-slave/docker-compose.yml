version: '3.5'

services:
  pg-master:
    image: bitnami/postgresql-repmgr:15
    container_name: pg-master
    ports:
      - "15432:5432"
    volumes:
      - pg_master_data:/bitnami/postgresql
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_POSTGRES_PASSWORD=postgrespassword
      - POSTGRESQL_PASSWORD=postgrespassword
      - POSTGRESQL_DATABASE=ha
      - POSTGRESQL_NUM_SYNCHRONOUS_REPLICAS=1
      - REPMGR_PRIMARY_HOST=pg-master
      - REPMGR_PARTNER_NODES=pg-master,pg-slave
      - REPMGR_NODE_NAME=pg-master-1
      - REPMGR_NODE_NETWORK_NAME=pg-master
      - REPMGR_USERNAME=repmgr
      - REPMGR_PASSWORD=repmgrpassword
    networks:
      - postgres-cluster
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  pg-slave:
    image: bitnami/postgresql-repmgr:15
    container_name: pg-slave
    ports:
      - "15433:5432"
    volumes:
      - pg_slave_data:/bitnami/postgresql
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_POSTGRES_PASSWORD=postgrespassword
      - POSTGRESQL_PASSWORD=postgrespassword
      - POSTGRESQL_DATABASE=ha
      - POSTGRESQL_NUM_SYNCHRONOUS_REPLICAS=1
      - REPMGR_PRIMARY_HOST=pg-master
      - REPMGR_PARTNER_NODES=pg-master,pg-slave
      - REPMGR_NODE_NAME=pg-slave-1
      - REPMGR_NODE_NETWORK_NAME=pg-slave
      - REPMGR_USERNAME=repmgr
      - REPMGR_PASSWORD=repmgrpassword
    networks:
      - postgres-cluster
    depends_on:
      - pg-master
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 512M

  pgpool:
    image: bitnami/pgpool:4
    container_name: pgpool
    ports:
      - "15434:5432"
    environment:
      - PGPOOL_BACKEND_NODES=0:pg-master:5432,1:pg-slave:5432
      - PGPOOL_SR_CHECK_USER=postgres
      - PGPOOL_SR_CHECK_PASSWORD=postgrespassword
      - PGPOOL_ENABLE_LDAP=no
      - PGPOOL_POSTGRES_USERNAME=postgres
      - PGPOOL_POSTGRES_PASSWORD=postgrespassword
      - PGPOOL_ADMIN_USERNAME=admin
      - PGPOOL_ADMIN_PASSWORD=adminpassword
      - PGPOOL_ENABLE_LOAD_BALANCING=yes
      - PGPOOL_POSTGRES_CUSTOM_USERS=postgres
      - PGPOOL_POSTGRES_CUSTOM_PASSWORDS=postgrespassword
    healthcheck:
      test: ["CMD", "/opt/bitnami/scripts/pgpool/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - postgres-cluster
    depends_on:
      - pg-master
      - pg-slave
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M

networks:
  postgres-cluster:
    driver: bridge

volumes:
  pg_master_data:
    driver: local
  pg_slave_data:
    driver: local
